<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Dashboard Saya</title>
    <!-- Icon Font Awesome untuk tampilan yang lebih profesional -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* RESET & BASE STYLE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            height: 100vh;
            background: #777;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* CONTAINER UTAMA */
        .container {
            background: white;
            padding: 50px 30px;
            width: 90%;
            max-width: 850px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { margin-bottom: 10px; font-size: 2.5rem; color: #222; }
        .subtitle { margin-bottom: 40px; color: #666; font-size: 1.1rem; }

        /* GRID MENU */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        /* CARD MENU */
        .menu-card {
            background: #fff;
            padding: 30px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #4facfe;
        }

        .menu-card i {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: #777;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-card h3 { margin-bottom: 10px; font-size: 1.25rem; }
        .menu-card p { font-size: 0.9rem; color: #888; line-height: 1.4; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: 1fr; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Halo Guest, Selamat Datang!</h1>
        <p class="subtitle">Eksplorasi seluruh konten website saya melalui menu di bawah ini.</p>
        
        <div class="menu-grid">
            <!-- Link ke Blog -->
            <a href="Blog.html" class="menu-card">
                <i class="fas fa-newspaper"></i>
                <h3>Blog</h3>
                <p>Baca blog pribadi saya.</p>
            </a>

            <!-- Link ke CV -->
            <a href="cv.html" class="menu-card">
                <i class="fas fa-id-card"></i>
                <h3>CV Saya</h3>
                <p>Lihat cv saya</p>
            </a>

            <!-- Link ke Login -->
            <a href="login.html" class="menu-card">
                <i class="fas fa-sign-in-alt"></i>
                <h3>Login</h3>
                <p>Masuk ke halaman login.</p>
            </a>
        </div>
    </div>
</body>
</html>
